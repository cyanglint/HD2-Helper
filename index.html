        function handlePresetListDragOver(e, container) {
            updatePresetDragAutoScroll(e, container);
            const dropState = getPresetListDropState(container, e);
            reorderPresetDuringDrag(container, dropState);
            setPresetDragEffect(e, 'move');
        }

        function updatePresetDragAutoScroll(e, container) {
            presetDragAutoScrollContainer = container;
            presetDragPointerX = e.clientX;
            presetDragPointerY = e.clientY;

            if (!presetDragAutoScrollFrame) {
                presetDragLastScrollTime = 0;
                presetDragAutoScrollFrame = requestAnimationFrame(runPresetDragAutoScroll);
            }
        }

        function runPresetDragAutoScroll(timestamp) {
            const container = presetDragAutoScrollContainer;
            if (!draggedPresetId || !container) {
                stopPresetDragAutoScroll();
                return;
            }

            const rect = container.getBoundingClientRect();
            const maxScrollLeft = container.scrollWidth - container.clientWidth;
            if (maxScrollLeft <= 0) {
                presetDragLastScrollTime = timestamp;
                presetDragAutoScrollFrame = requestAnimationFrame(runPresetDragAutoScroll);
                return;
            }

            const edgeSize = Math.min(96, Math.max(64, rect.width * 0.14));
            const minSpeed = 70;
            const maxSpeed = 720;
            let direction = 0;
            let strength = 0;

            if (presetDragPointerX < rect.left + edgeSize && container.scrollLeft > 0) {
                direction = -1;
                strength = (rect.left + edgeSize - presetDragPointerX) / edgeSize;
            } else if (presetDragPointerX > rect.right - edgeSize && container.scrollLeft < maxScrollLeft) {
                direction = 1;
                strength = (presetDragPointerX - (rect.right - edgeSize)) / edgeSize;
            }

            strength = Math.max(0, Math.min(1, strength));

            if (direction && strength) {
                const dt = presetDragLastScrollTime ? Math.min(40, timestamp - presetDragLastScrollTime) : 16;
                const before = container.scrollLeft;
                const easedStrength = strength * strength * (3 - 2 * strength);
                const speed = minSpeed + (maxSpeed - minSpeed) * easedStrength;
                container.scrollLeft = Math.max(0, Math.min(maxScrollLeft, before + direction * speed * (dt / 1000)));

                if (container.scrollLeft !== before) {
                    const dropState = getPresetListDropState(container, {
                        clientX: presetDragPointerX,
                        clientY: presetDragPointerY
                    });
                    reorderPresetDuringDrag(container, dropState);
                }
            }

            presetDragLastScrollTime = timestamp;
            presetDragAutoScrollFrame = requestAnimationFrame(runPresetDragAutoScroll);
        }

        function stopPresetDragAutoScroll() {
            if (presetDragAutoScrollFrame) cancelAnimationFrame(presetDragAutoScrollFrame);
            presetDragAutoScrollFrame = 0;
            presetDragAutoScrollContainer = null;
            presetDragLastScrollTime = 0;
        }

        function reorderPresetDuringDrag(container, dropState) {
            if (!dropState) return false;

            document.querySelector(`.preset-tab[data-preset-id="${CSS.escape(draggedPresetId)}"]`)?.classList.add('dragging');

            const [movedPreset] = presets.splice(dropState.fromIndex, 1);
            presets.splice(dropState.toIndex, 0, movedPreset);
            presetOrderChanged = true;
            syncPresetTabDomOrder(container);
            updatePresetSelectedRule();
            return true;
        }

        function syncPresetTabDomOrder(container) {
            const addTab = container.querySelector('.preset-tab.add');
            presets.forEach(preset => {
                const tab = container.querySelector(`.preset-tab[data-preset-id="${CSS.escape(preset.id)}"]`);
                if (tab) container.insertBefore(tab, addTab);
            });
        }

        function handlePresetListDrop(e, container) {
            e.preventDefault();
            e.stopPropagation();

            suppressNextPresetClick();
            removePresetDragShields();
            clearPresetDraggingState();
            document.activeElement?.blur();
            if (presetOrderChanged) {
                savePresets();
                presetOrderChanged = false;
            }
        }

        function getPresetListDropState(container, e) {
            if (!draggedPresetId || presets.length === 0) return null;

            const fromIndex = presets.findIndex(preset => preset.id === draggedPresetId);
            if (fromIndex < 0) return null;

            const selector = '.preset-tab[data-preset-id]';
            const items = [...container.querySelectorAll(selector)];
            if (items.length === 0) return null;

            let insertIndex = items.length;

            for (let i = 0; i < items.length; i++) {
                const rect = items[i].getBoundingClientRect();

                const midpoint = rect.left + rect.width / 2;

                const mousePos = e.clientX;

                if (mousePos < midpoint) {
                    insertIndex = i;
                    break;
                }
            }

            let toIndex = insertIndex;
            if (fromIndex < toIndex) toIndex--;
            if (toIndex === fromIndex) return null;

            return {
                fromIndex,
                toIndex
            };
        }

        function clearPresetDraggingState() {
            document.querySelectorAll('.preset-tab.dragging').forEach(item => item.classList.remove('dragging'));
        }

        function getNextPresetName() {
            let index = 1;
            const names = new Set(presets.map(preset => preset.name));
            while (names.has(`프리셋 ${index}`)) index++;
            return `프리셋 ${index}`;
        }

        function addPreset() {
            const preset = {
                id: `preset-${Date.now()}`,
                name: getNextPresetName(),
                loadout: normalizePresetLoadout()
            };

            presets.push(preset);
            selectedPresetId = preset.id;
            applyPresetLoadout(preset.loadout);
            renderPresetTabs();

            requestAnimationFrame(() => {
                const container = document.getElementById('preset-tabs-bar');

                container.scrollTo({
                    left: container.scrollWidth,
                    behavior: 'smooth'
                });
            });

            savePresets();
        }

        function selectPreset(e, id) {
            if (suppressPresetClick) {
                e?.preventDefault();
                e?.stopPropagation();
                suppressPresetClick = false;
                clearTimeout(suppressPresetClickTimer);
                return;
            }

            const preset = presets.find(item => item.id === id);
            if (!preset) return;

            if (selectedPresetId === id) {
                return;
            }

            selectedPresetId = id;
            applyPresetLoadout(preset.loadout);
            renderPresetTabs();

            requestAnimationFrame(() => {
                const container = document.getElementById('preset-tabs-bar');
                const selectedTab = container?.querySelector('.preset-tab.selected');

                if (!container || !selectedTab) return;

                const tabLeft = selectedTab.offsetLeft;
                const tabRight = tabLeft + selectedTab.offsetWidth;

                const viewLeft = container.scrollLeft;
                const viewRight = viewLeft + container.clientWidth;

                if (tabLeft < viewLeft) {
                    container.scrollTo({
                        left: tabLeft,
                        behavior: 'smooth'
                    });
                } else if (tabRight > viewRight) {
                    container.scrollTo({
                        left: tabRight - container.clientWidth,
                        behavior: 'smooth'
                    });
                }
            });
        }

        function startPresetInlineRename(id) {
            const preset = presets.find(item => item.id === id);
            if (!preset) return;

            const tab = document.querySelector(`#preset-tabs-bar .preset-tab[data-preset-id="${CSS.escape(id)}"]`);
            if (tab) {
                const nameLabel = tab.querySelector('span');
                const width = nameLabel?.getBoundingClientRect().width || tab.getBoundingClientRect().width;
                document.documentElement.style.setProperty('--preset-rename-width', `${width}px`);
            }

            editingPresetId = id;
            renderPresetTabs();
        }

        function cancelPresetInlineRename() {
            editingPresetId = '';
            renderPresetTabs();
        }

        function confirmPresetInlineRename() {
            if (!editingPresetId) return;

            const preset = presets.find(item => item.id === editingPresetId);
            const input = document.querySelector('.preset-rename-inline');
            const nextName = input.textContent.trim();
            if (!preset) {
                editingPresetId = '';
                renderPresetTabs();
                return;
            }

            if (nextName) preset.name = nextName;
            editingPresetId = '';
            renderPresetTabs();
            if (nextName) savePresets();
        }

        function handlePresetInlineRenameKey(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                e.currentTarget.blur();
            } else if (e.key === 'Escape') {
                e.preventDefault();
                cancelPresetInlineRename();
            }
        }

        function requestDeletePreset(id) {
            const preset = presets.find(item => item.id === id);
            if (!preset) return;

            openConfirmModal(
                `${preset.name} 삭제`,
                `프리셋을 삭제하면 되돌릴 수 없습니다.\n정말 삭제하시겠습니까?`,
                '삭제',
                () => deletePreset(id)
            );
        }

        function deletePreset(id) {
            const nextPresets = presets.filter(preset => preset.id !== id);
            if (nextPresets.length === presets.length) return;

            presets = nextPresets;
            if (selectedPresetId === id) {
                selectedPresetId = '';
                clearAllLoadout();
            }
            renderPresetTabs();
            savePresets();
        }

        function saveSelectedPreset(id = selectedPresetId) {
            const preset = presets.find(item => item.id === id);
            if (!preset) return;

            preset.loadout = getCurrentLoadout();
            selectedPresetId = id;
            renderPresetTabs();
            savePresets();
            showPresetSaveFeedback(id);
        }

        async function generateRandomLoadout() {
            if (!dbData) return;
            const renderToken = ++loadoutRenderToken;

            if (renderToken !== loadoutRenderToken) return;

            const stratPool = flattenDatabaseType('스트라타젬')
                .filter(item => item.Category !== '임무' && !excludedItems.has(item.Name))
                .sort(() => Math.random() - 0.5);

            let hasBackpack = false;
            let hasExosuit = false;
            let pickedCount = 0;
            const selectedStratagems = [];

            for (const item of stratPool) {
                if (pickedCount >= 4) break;

                const isBackpack = isBackpackStratagem(item);
                const isExosuit = isExosuitStratagem(item);

                if (isBackpack && hasBackpack) continue;
                if (isExosuit && hasExosuit) continue;

                pickedCount++;
                selectedStratagems.push(item);

                if (isBackpack) hasBackpack = true;
                if (isExosuit) hasExosuit = true;
            }

            const selectedLoadoutItems = [];
            ['방어구', '주 무기', '보조 무기', '투척 무기'].forEach(type => {
                const pool = flattenDatabaseType(type)
                    .filter(item => !excludedItems.has(item.Name));
                const item = getRandomItem(pool);
                if (item) selectedLoadoutItems.push({ type, item });
            });

            const selectedLoadoutImageUrls = selectedLoadoutItems
                .map(({ type, item }) => getCachedDisplayImageUrl(type, item.Name));

            for (let index = 0; index < 10; index++) {
                const item = selectedStratagems[index];
                renderStratagemSlot(
                    document.getElementById(`slot-${index + 1}`),
                    index + 1,
                    item?.Name || '',
                    item ? getItemImageUrl('스트라타젬', item.Name) : ''
                );
            }

            const selectedLoadoutMap = new Map(
                selectedLoadoutItems.map(({ type, item }, index) => [type, { item, imgUrl: selectedLoadoutImageUrls[index] }])
            );
            ['방어구', '주 무기', '보조 무기', '투척 무기'].forEach(type => {
                const selected = selectedLoadoutMap.get(type);
                renderLoadoutBox(type, selected?.item?.Name || '', selected?.imgUrl || '');
            });
            syncCurrentLoadoutToApp();
        }

        fetch('https://hd2.local/database.json')
            .then(res => res.json())
            .then(data => {
                dbData = data;
                warmupImageCache(data)
                    .catch(() => { })
                    .finally(notifyImageCacheReady);
            })
            .catch(() => {
                notifyImageCacheReady();
            });

        function alignModalSlotSelectorToSelected(smooth = false) {
            const selector = document.getElementById('modal-slot-selector');
            const selectedButton = selector.querySelector('.modal-slot-btn.selected');
            if (!selectedButton) return;

            const targetLeft = selectedButton.offsetLeft - ((selector.clientWidth - selectedButton.offsetWidth) / 2);
            selector.scrollTo({
                left: Math.max(0, targetLeft),
                behavior: smooth ? 'smooth' : 'auto'
            });
        }

        function renderModalSlotSelector(selectedIndex, initialScrollLeft = 0) {
            const selector = document.getElementById('modal-slot-selector');
            selector.innerHTML = '';
            selector.style.display = 'flex';
            selector.onwheel = (event) => {
                if (Math.abs(event.deltaY) <= Math.abs(event.deltaX)) return;
                event.preventDefault();
                selector.scrollLeft += event.deltaY;
            };

            for (let index = 1; index <= 10; index++) {
                const slot = document.getElementById(`slot-${index}`);
                const slotName = slot?.dataset.itemName || '';
                const slotImage = slot?.querySelector(':scope > img')?.getAttribute('src') || '';
                const button = document.createElement('button');
                button.type = 'button';
                button.className = `modal-slot-btn${index === selectedIndex ? ' selected' : ''}`;
                button.dataset.slotIndex = index.toString();
                button.setAttribute('draggable', 'true');
                button.setAttribute('tabindex', '-1');

                renderStratagemSlot(button, index, slotName, slotImage);
                button.addEventListener('click', () => openModal('스트라타젬', index, { preserveScroll: true, smoothSlotScroll: true }));
                button.addEventListener('contextmenu', (event) => clearStratagemSlot(event, index));
                button.addEventListener('dragstart', handleDragStart);
                button.addEventListener('dragend', handleDragEnd);
                button.addEventListener('dragover', handleDragOver);
                button.addEventListener('drop', handleDrop);
                selector.appendChild(button);
            }

            selector.scrollLeft = initialScrollLeft;
        }

        async function openModal(type, slotIndex = null, options = {}) {
            const renderToken = ++modalRenderToken;
            const preserveScroll = options.preserveScroll === true;
            const smoothSlotScroll = options.smoothSlotScroll === true;
            const slotSelector = document.getElementById('modal-slot-selector');
            const modalItemList = document.getElementById('modal-item-list');
            const previousSlotScrollLeft = preserveScroll ? slotSelector.scrollLeft : 0;
            const previousListScrollTop = preserveScroll ? modalItemList.scrollTop : 0;

            document.getElementById('modal-search').value = '';
            updateModalSearchPlaceholder(type);
            document.getElementById('modal-search-clear').style.display = 'none';
            document.getElementById('no-result-message').style.display = 'none';
            slotSelector.style.display = 'none';

            const dynamicContainer = document.getElementById('modal-dynamic-content');
            dynamicContainer.innerHTML = '';

            if (!dbData || !dbData[type]) {
                return;
            }

            if (renderToken !== modalRenderToken) return;

            if (type === '스트라타젬') {
                currentTargetSlot = { type: '스트라타젬', index: slotIndex };
                setModalTitle(
                    `스트라타젬 선택 #${slotIndex}`,
                    '(배치 변경)'
                );
                renderModalSlotSelector(slotIndex, previousSlotScrollLeft);

                const equippedStratagems = [];
                let hasEquippedExosuit = false;
                let currentSlotItemName = null;
                const allSlots = slotsContainer.querySelectorAll('.slot');

                allSlots.forEach((slot, index) => {
                    const name = slot.dataset.itemName;
                    if (!name) return;
                    if (index + 1 === slotIndex) currentSlotItemName = name;
                    else {
                        equippedStratagems.push(name);
                        if (isExosuitStratagem(name)) hasEquippedExosuit = true;
                    }
                });

                Object.keys(dbData['스트라타젬']).forEach(category => {
                    const groupData = dbData['스트라타젬'][category];
                    if (!groupData || groupData.length === 0) return;

                    const groupWrap = document.createElement('div');
                    groupWrap.className = 'category-group';
                    groupWrap.innerHTML = `<div class="category-title">${category}</div>`;

                    const gridContainer = document.createElement('div');
                    gridContainer.className = getStratagemGridLayoutClass();

                    groupData.forEach(item => {
                        if (excludedItems.has(item.Name)) return;
                        const imgUrl = `https://hd2.local/images/Stratagems/${item.Name}.png`;
                        let statusClass = '';
                        if (item.Name === currentSlotItemName) statusClass = 'selected-current';
                        else if (equippedStratagems.includes(item.Name)) statusClass = 'disabled';
                        else if (hasEquippedExosuit && isExosuitStratagem(item)) statusClass = 'disabled';

                        const card = document.createElement('div');
                        card.className = `mini-card ${statusClass}`;
                        card.setAttribute('data-name', normalizeSearchText(item.Name));
                        card.setAttribute('data-raw-name', item.Name);
                        card.setAttribute('data-rule-disabled', statusClass.includes('disabled') && !excludedItems.has(item.Name) ? 'true' : 'false');
                        card.setAttribute('tabindex', '-1');
                        if (stratagemCompactLayout) card.title = item.Name;
                        else card.removeAttribute('title');
                        card.innerHTML = getStratagemCardHtml(item.Name, imgUrl);
                        card.addEventListener('contextmenu', (e) => toggleExcludedItem(e, item.Name, '스트라타젬'));

                        if (!statusClass.includes('disabled')) {
                            card.addEventListener('click', () => selectItem(item.Name, imgUrl));
                        }
                        gridContainer.appendChild(card);
                    });
                    if (gridContainer.children.length > 0) {
                        groupWrap.appendChild(gridContainer);
                        dynamicContainer.appendChild(groupWrap);
                    }
                });

            } else {
                currentTargetSlot = { type: type };
                setModalTitle(`${type} 선택`);

                let targetId = '', ratioClass = 'img-ratio-weapon', svgW = 640, svgH = 360;

                if (type === '방어구') { targetId = 'selected-armor'; ratioClass = 'img-ratio-armor'; svgW = 200; svgH = 200; }
                else if (type === '주 무기') { targetId = 'selected-primary'; }
                else if (type === '보조 무기') { targetId = 'selected-secondary'; }
                else if (type === '투척 무기') { targetId = 'selected-grenade'; ratioClass = 'img-ratio-grenade'; svgW = 480; svgH = 480; }

                const currentEquippedName = document.getElementById(targetId) ? (document.getElementById(targetId).dataset.itemName || null) : null;

                Object.keys(dbData[type]).forEach(category => {
                    if (isHiddenDatabaseCategory(type, category)) return;

                    const groupData = dbData[type][category];
                    if (!groupData || groupData.length === 0) return;

                    const groupWrap = document.createElement('div');
                    groupWrap.className = 'category-group';
                    groupWrap.innerHTML = `<div class="category-title">${category}</div>`;

                    const listContainerLayout = document.createElement('div');
                    listContainerLayout.className = 'item-list-layout';

                    groupData.forEach(item => {
                        if (excludedItems.has(item.Name)) return;
                        const imgUrl = getCachedDisplayImageUrl(type, item.Name);
                        const description = item.Desc || "상세 정보가 없습니다.";
                        let passiveHtml = '';

                        let statusClass = (item.Name === currentEquippedName) ? 'selected-current' : '';

                        if (type === '방어구' && item.Passives) {
                            const pName = item.Passives.trim();
                            const pData = getPassiveItem(pName);
                            const pDesc = pData ? pData.Desc : "상세 효과 데이터가 없습니다.";
                            const pIconUrl = `https://hd2.local/images/passives/${pName}.png`;

                            passiveHtml = `
                                                                        <div class="passive-container">
                                                                            <img class="passive-icon" src="${pIconUrl}" onerror="setImageFallback(this, 48, 48)">
                                                                            <div class="passive-info">
                                                                                <div class="passive-name">${pName}</div>
                                                                                <div class="passive-desc">${pDesc}</div>
                                                                            </div>
                                                                        </div>
                                                                    `;
                        }

                        const card = document.createElement('div');
                        card.className = `mini-card ${statusClass}`;
                        card.setAttribute('data-name', getItemSearchText(type, item));
                        card.setAttribute('data-raw-name', item.Name);
                        card.setAttribute('data-rule-disabled', 'false');
                        card.setAttribute('tabindex', '-1');
                        card.innerHTML = `
                                                                    <img class="${ratioClass}" src="${imgUrl}" onerror="setImageFallback(this, ${svgW}, ${svgH})" />
                                                                    <div class="info-area">
                                                                        <div class="name">${item.Name}</div>
                                                                        <div class="desc">${description}</div>
                                                                    ${passiveHtml}
                                                                    </div>
                                                                `;
                        if (!imgUrl) setImageFallback(card.querySelector('img'), svgW, svgH);
                        card.addEventListener('contextmenu', (e) => toggleExcludedItem(e, item.Name, type));
                        card.addEventListener('click', () => selectItem(item.Name, imgUrl));

                        listContainerLayout.appendChild(card);
                    });
                    if (listContainerLayout.children.length > 0) {
                        groupWrap.appendChild(listContainerLayout);
                        dynamicContainer.appendChild(groupWrap);
                    }
                });
            }
            renderExcludedItemsCategory();
            updateExcludedCardStates();
            document.getElementById('item-modal').style.display = 'flex';
            modalItemList.scrollTop = previousListScrollTop;
            if (type === '스트라타젬') {
                requestAnimationFrame(() => alignModalSlotSelectorToSelected(smoothSlotScroll));
            }
        }

        function filterModalItems() {
            const searchInput = document.getElementById('modal-search');
            const clearButton = document.getElementById('modal-search-clear');
            const query = normalizeSearchText(searchInput.value);
            const categoryGroups = document.querySelectorAll('#modal-dynamic-content .category-group');
            const noResultMsg = document.getElementById('no-result-message');

            clearButton.style.display = query ? 'flex' : 'none';

            let totalVisibleCards = 0;

            categoryGroups.forEach(group => {
                const cards = group.querySelectorAll('.mini-card');
                let visibleCount = 0;

                cards.forEach(card => {
                    const itemName = card.getAttribute('data-name');
                    if (itemName.includes(query)) {
                        card.style.display = '';
                        visibleCount++;
                        totalVisibleCards++;
                    } else {
                        card.style.display = 'none';
                    }
                });

                group.style.display = (visibleCount === 0 && query !== '') ? 'none' : '';
            });

            noResultMsg.style.display = (totalVisibleCards === 0 && query !== '') ? 'block' : 'none';
        }

        function clearModalSearch() {
            const searchInput = document.getElementById('modal-search');
            searchInput.value = '';
            filterModalItems();
            document.getElementById('modal-item-list').scrollTop = 0;
        }

        function openConfirmModal(title, message, okText, onConfirm) {
            pendingConfirmAction = onConfirm;
            document.getElementById('confirm-title').innerText = title;
            document.getElementById('confirm-message').innerText = message;
            document.getElementById('confirm-ok').innerText = okText;
            document.getElementById('confirm-modal').style.display = 'block';
        }

        function closeConfirmModal() {
            pendingConfirmAction = null;
            document.getElementById('confirm-modal').style.display = 'none';
        }

        document.getElementById('confirm-ok').addEventListener('click', () => {
            const action = pendingConfirmAction;
            closeConfirmModal();
            if (typeof action === 'function') action();
        });

        function closeModal(e) {
            if (e.target.id === 'item-modal') document.getElementById('item-modal').style.display = 'none';
        }

        async function selectItem(name, imgUrl) {
            if (!currentTargetSlot) return;
            if (excludedItems.has(name)) return;
            loadoutRenderToken++;

            if (currentTargetSlot.type === '스트라타젬') {
                if (isExosuitStratagem(name) && hasExosuitEquippedExcept(currentTargetSlot.index)) return;
                const slot = document.getElementById(`slot-${currentTargetSlot.index}`);
                renderStratagemSlot(slot, currentTargetSlot.index, name, imgUrl);
                syncCurrentLoadoutToApp();

                if (currentTargetSlot.index < 10) {
                    await openModal('스트라타젬', currentTargetSlot.index + 1, { preserveScroll: true, smoothSlotScroll: true });
                } else {
                    document.getElementById('item-modal').style.display = 'none';
                }
            } else {
                const displayImageUrl = getCachedDisplayImageUrl(currentTargetSlot.type, name);
                renderLoadoutBox(currentTargetSlot.type, name, displayImageUrl);
                syncCurrentLoadoutToApp();
                document.getElementById('item-modal').style.display = 'none';
            }
        }
    </script>
</body>
</html>
